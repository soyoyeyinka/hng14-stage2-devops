name: CI

on:
  push:
    branches:
      - main
      - ci-pipeline
      - ci-full-pipeline
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint api Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python lint tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint Python code
        run: flake8 api worker --max-line-length=120 --exclude=__pycache__

  validate-and-smoke-test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create env file
        run: |
          cat > .env <<'EOF'
          REDIS_IMAGE=redis:7-alpine
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_DB=0
          JOB_QUEUE_NAME=job
          API_PORT=8000
          FRONTEND_PORT=3000
          REDIS_MEM_LIMIT=256m
          REDIS_CPUS=0.50
          API_MEM_LIMIT=256m
          API_CPUS=0.50
          WORKER_MEM_LIMIT=256m
          WORKER_CPUS=0.50
          FRONTEND_MEM_LIMIT=256m
          FRONTEND_CPUS=0.50
          COMPOSE_NETWORK_NAME=jobnet
          COMPOSE_PUBLIC_NETWORK_NAME=jobnet-public
          EOF

      - name: Start containers
        run: docker compose up -d --build

      - name: Show running containers
        run: docker compose ps

      - name: Wait for api to become healthy
        run: |
          for i in {1..12}; do
            if curl -fsS http://localhost:8000/health; then
              exit 0
            fi
            sleep 5
          done
          docker compose ps
          docker compose logs --no-color
          exit 1

      - name: Wait for frontend to become healthy
        run: |
          for i in {1..18}; do
            if curl -fsS http://localhost:3000/health; then
              exit 0
            fi
            sleep 5
          done
          docker compose ps
          docker compose logs --no-color
          exit 1

      - name: Smoke test job creation
        run: |
          response=$(curl -s -X POST http://localhost:8000/jobs)
          echo "$response"
          echo "$response" | grep job_id

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Shut down containers
        if: always()
        run: docker compose down -v
