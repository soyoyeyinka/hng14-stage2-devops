name: CI

on:
  push:
    branches:
      - main
      - ci-full-pipeline
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python lint tools and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r api/requirements.txt
          pip install -r worker/requirements.txt

      - name: Lint Python code
        run: |
          flake8 api worker --max-line-length=120 --exclude=__pycache__

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Lint api Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

  validate-and-smoke-test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create env file
        run: cp .env.example .env

      - name: Start containers
        run: docker compose up -d --build

      - name: API health check
        run: curl --retry 10 --retry-delay 5 --retry-connrefused http://localhost:8000/health

      - name: Frontend health check
        run: curl --retry 10 --retry-delay 5 --retry-connrefused http://localhost:3000/health

      - name: Shut down containers
        if: always()
        run: docker compose down -v
