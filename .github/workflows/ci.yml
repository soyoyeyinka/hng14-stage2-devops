name: CI

on:
  push:
    branches:
      - main
      - ci-pipeline
      - ci-full-pipeline
      - test-stage
      - build-stage
      - security-scan-stage
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint api Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python lint tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint Python code
        run: flake8 api worker --max-line-length=120 --exclude=__pycache__

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install -r api/requirements-dev.txt

      - name: Run API unit tests with coverage
        env:
          PYTHONPATH: api
        run: |
          pytest api/tests \
            --cov=api \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build api image
        run: |
          docker build \
            -t hng14-stage2-devops-api:${SHORT_SHA} \
            -t hng14-stage2-devops-api:latest \
            ./api

      - name: Build worker image
        run: |
          docker build \
            -t hng14-stage2-devops-worker:${SHORT_SHA} \
            -t hng14-stage2-devops-worker:latest \
            ./worker

      - name: Build frontend image
        run: |
          docker build \
            -t hng14-stage2-devops-frontend:${SHORT_SHA} \
            -t hng14-stage2-devops-frontend:latest \
            ./frontend

      - name: Show built images
        run: docker image ls

      - name: Export api image artifact
        run: docker save hng14-stage2-devops-api:${SHORT_SHA} | gzip > api-image.tar.gz

      - name: Export worker image artifact
        run: docker save hng14-stage2-devops-worker:${SHORT_SHA} | gzip > worker-image.tar.gz

      - name: Export frontend image artifact
        run: docker save hng14-stage2-devops-frontend:${SHORT_SHA} | gzip > frontend-image.tar.gz

      - name: Upload built image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-images
          path: |
            api-image.tar.gz
            worker-image.tar.gz
            frontend-image.tar.gz

  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Download built image artifacts
        uses: actions/download-artifact@v4
        with:
          name: built-images
          path: built-images

      - name: Load images into Docker
        run: |
          gunzip -c built-images/api-image.tar.gz | docker load
          gunzip -c built-images/worker-image.tar.gz | docker load
          gunzip -c built-images/frontend-image.tar.gz | docker load

      - name: Scan api image and generate SARIF
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          scan-type: image
          image-ref: hng14-stage2-devops-api:${{ env.SHORT_SHA }}
          format: sarif
          output: api-trivy.sarif
          severity: CRITICAL
          exit-code: "0"

      - name: Scan worker image and generate SARIF
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          scan-type: image
          image-ref: hng14-stage2-devops-worker:${{ env.SHORT_SHA }}
          format: sarif
          output: worker-trivy.sarif
          severity: CRITICAL
          exit-code: "0"

      - name: Scan frontend image and generate SARIF
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          scan-type: image
          image-ref: hng14-stage2-devops-frontend:${{ env.SHORT_SHA }}
          format: sarif
          output: frontend-trivy.sarif
          severity: CRITICAL
          exit-code: "0"

      - name: Upload SARIF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-reports
          path: |
            api-trivy.sarif
            worker-trivy.sarif
            frontend-trivy.sarif

      - name: Fail on CRITICAL vulnerabilities in api image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: hng14-stage2-devops-api:${{ env.SHORT_SHA }}
          format: table
          severity: CRITICAL
          exit-code: "1"

      - name: Fail on CRITICAL vulnerabilities in worker image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: hng14-stage2-devops-worker:${{ env.SHORT_SHA }}
          format: table
          severity: CRITICAL
          exit-code: "1"

      - name: Fail on CRITICAL vulnerabilities in frontend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: hng14-stage2-devops-frontend:${{ env.SHORT_SHA }}
          format: table
          severity: CRITICAL
          exit-code: "1"

  validate-and-smoke-test:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create env file
        run: cp .env.example .env

      - name: Start containers
        run: docker compose up -d --build

      - name: Show running containers
        run: docker compose ps

      - name: Wait for api to become healthy
        run: |
          for i in {1..12}; do
            if curl -fsS http://localhost:8000/health; then
              exit 0
            fi
            sleep 5
          done
          docker compose ps
          docker compose logs --no-color
          exit 1

      - name: Wait for frontend to become healthy
        run: |
          for i in {1..18}; do
            if curl -fsS http://localhost:3000/health; then
              exit 0
            fi
            sleep 5
          done
          docker compose ps
          docker compose logs --no-color
          exit 1

      - name: Smoke test job creation
        run: |
          response=$(curl -s -X POST http://localhost:8000/jobs)
          echo "$response"
          echo "$response" | grep job_id

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Shut down containers
        if: always()
        run: docker compose down -v
